# =====================================================================
# Fly.io — servicio API (FastAPI)
# Deploy: fly deploy -c fly/api.fly.toml --remote-only
# =====================================================================

app            = "mortalidad-api"
primary_region = "gru"          # São Paulo (más cercano a Buenos Aires; scl deprecado)
kill_signal    = "SIGINT"
kill_timeout   = "5s"

[build]
  # Paths relativos al directorio de este toml (fly/).
  # Por eso usamos ../ para apuntar a la raíz del repo.
  dockerfile = "../docker/Dockerfile.api"

[env]
  PORT       = "8000"
  LOG_LEVEL  = "INFO"
  LOG_FORMAT = "json"
  MODEL_DIR  = "/app/data/models"
  # DATABASE_URL la inyecta `fly postgres attach`.
  # DASHBOARD_ORIGIN se setea con `fly secrets set` tras crear el dashboard.

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type     = "http"
    port     = 8000
    method   = "get"
    path     = "/health"
    interval = "30s"
    timeout  = "5s"
    grace_period = "15s"
