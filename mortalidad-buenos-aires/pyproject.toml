[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra --strict-markers"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["etl", "api"]
omit = [
    "*/tests/*",
    "*/notebooks/*",
    "*/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# FastAPI usa Depends() en defaults de parámetros — patrón canónico, no es bug.
"api/routers/*.py" = ["B008"]
# Notebooks de exploración, no son código productivo.
"notebooks/**" = ["ALL"]
